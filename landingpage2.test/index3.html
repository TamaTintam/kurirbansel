<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>🛵 Kurir Bansel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Styles -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <meta name="theme-color" content="#0d6efd">
  <style>
    #map, #mapPopup { height: 300px; }
  </style>
  <style>
    body {
        background: url('images/kurir-wall2.jpg') no-repeat center center fixed;
        background-size: cover;
        }
    </style>
</head>
<body class="bg-light">
    
<div class="container mt-4 p-4 bg-image-block shadow rounded">
    <div class="mb-3 d-flex align-items-center">
        <img src="images/logo-kurir.png" width="100">
        <span>
            <h5>Website</h5>
            <h4 class="mb-3 text-center">Kurir Bansel</h4>
        </span>
    </div>
  
  <marquee class="mb-3" id="marqueeInfo">
    🚚 Memuat informasi tarif...
  </marquee>

  <form id="formOrder">
    <!-- Lokasi Pengirim -->
    <div class="mb-3">
      <label>Lokasi Pengirim</label>
      <div class="input-group">
        <input type="text" class="form-control opacity-75" id="origin" readonly>
        <button class="opacity-75" type="button" onclick="bukaPeta('origin')">📍</button>
        <button class="opacity-75" type="button" onclick="bukaModalKoordinat('origin')">🗺Google Maps</button>
      </div>
    </div>
    
    <!-- Lokasi Tujuan -->
    <div class="mb-3">
      <label>Lokasi Tujuan</label>
      <div class="input-group">
        <input type="text" class="form-control opacity-75" id="destination" readonly>
        <button class="btn btn-outline-success" type="button" onclick="bukaPeta('destination')">📍</button>
        <button class="btn btn-outline-secondary" type="button" onclick="bukaModalKoordinat('destination')">🗺Google Maps</button>
      </div>
    </div>


    <!-- Tambah input koordinat manual>
    <div class="mb-3">
      <label>Tempel Koordinat dari Google Maps</label>
      <input type="text" class="form-control" id="koordinatManual" placeholder="-0.8,119.6">
      <button class="btn btn-sm btn-outline-secondary mt-2" type="button" onclick="setKoordinatManual()">Set Sebagai Tujuan</button>
    </div-->

    <!-- Deskripsi Barang -->
    <div class="mb-3">
      <label>Deskripsi Barang</label>
      <input type="text" class="form-control opacity-75" id="barang" required placeholder="Contoh: Paket 2kg">
    </div>

    <!-- Nomor WhatsApp -->
    <div class="mb-3">
      <label>Nomor WhatsApp Tujuan</label>
      <input type="text" class="form-control opacity-75" id="wa" required placeholder="08xxxxxxxx" data-bs-toggle="tooltip" title="Tanpa spasi atau tanda (-)">
    </div>

    <!-- Estimasi Ongkir -->
    <div class="mb-3 fw-bold">
      <label>Estimasi Ongkir:</label>
      <h5 id="ongkir">Rp 0</h5>
    </div>

    <!-- Peta Utama -->
    <div id="map" class="mb-3"></div>

    <!-- Tombol Submit -->
    <button type="submit" class="btn btn-success w-100">Pesan via WhatsApp</button>
  </form>
</div>

<!-- Modal Pilih Lokasi -->
<div class="modal fade" id="modalPeta" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Pilih Lokasi</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="mapPopup"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Koordinat Manual -->
<div class="modal fade" id="modalKoordinat" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Tempel Koordinat dari Google Maps</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label>Contoh format: -0.8,119.6</label>
        <input type="text" id="inputKoordinat" class="form-control" placeholder="-0.8,119.6">
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="setKoordinatDariModal()">OK</button>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Tambahkan fungsi tampilkanRute untuk menggambar rute di peta utama
function tampilkanRute() {
  if (!userLatLng || !tujuanLatLng) return;

  const url = `https://router.project-osrm.org/route/v1/driving/${userLatLng[1]},${userLatLng[0]};${tujuanLatLng[1]},${tujuanLatLng[0]}?overview=full&geometries=geojson`;

  fetch(url)
    .then(res => res.json())
    .then(json => {
      if (json.routes?.length > 0) {
        const route = json.routes[0].geometry;
        if (osrmLayer) map.removeLayer(osrmLayer); // Hapus rute lama jika ada
        osrmLayer = L.geoJSON(route, {
          color: 'blue',
          weight: 4
        }).addTo(map); // Tampilkan rute baru
      }
    });
}

</script>
<script>
  let map, userLatLng, tujuanLatLng;
  let originMarker, tujuanMarker, osrmLayer;
  let popupMap, popupMarker, targetInputId;
  let tarifPerKm = 2000;
  let tarifLebihPerKm = 2500;

  // Gunakan tile satelit dari ESRI
  map = L.map('map').setView([-0.8059, 119.6364], 13);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri'
  }).addTo(map);

  // Geolokasi asal
  navigator.geolocation.getCurrentPosition(async function(pos) {
    userLatLng = [pos.coords.latitude, pos.coords.longitude];
    map.setView(userLatLng, 15);
    originMarker = L.marker(userLatLng).addTo(map).bindPopup("Lokasi Anda").openPopup();

    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLatLng[0]}&lon=${userLatLng[1]}&format=json`);
    const data = await res.json();
    document.getElementById("origin").value = data.display_name;
  });

  map.on("click", async function(e) {
    tujuanLatLng = [e.latlng.lat, e.latlng.lng];
    if (tujuanMarker) map.removeLayer(tujuanMarker);
    tujuanMarker = L.marker(tujuanLatLng).addTo(map).bindPopup("Tujuan").openPopup();

    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${tujuanLatLng[0]}&lon=${tujuanLatLng[1]}&format=json`);
    const data = await res.json();
    document.getElementById("destination").value = data.display_name;
    hitungJarakDanBiaya();
    tampilkanRute(); //paggil rute pengiriman

  });

  async function hitungJarakDanBiaya() {
    if (!userLatLng || !tujuanLatLng) return;

    const url = `https://router.project-osrm.org/route/v1/driving/${userLatLng[1]},${userLatLng[0]};${tujuanLatLng[1]},${tujuanLatLng[0]}?overview=false`;
    const res = await fetch(url);
    const json = await res.json();

    if (json.routes?.length > 0) {
      const km = json.routes[0].distance / 1000;
      //const biaya = Math.ceil(km) * tarifPerKm; // tarif lama
      let biaya; // hitung tarif baru
      if (km <= 5) {
          biaya = Math.ceil(km) * tarifPerKm;
      } else {
          const jarakAwal = 5;
          const sisanya = Math.ceil(km - jarakAwal);
          biaya = (jarakAwal * tarifPerKm) + (sisanya * tarifLebihPerKm);
      }

      document.getElementById("ongkir").innerText = "Rp " + biaya.toLocaleString();
      document.getElementById("ongkir").dataset.biaya = biaya;
    }
  }

  function bukaPeta(inputId) {
    targetInputId = inputId;
    const modal = new bootstrap.Modal(document.getElementById('modalPeta'));
    modal.show();

    setTimeout(() => {
      if (!popupMap) {
        popupMap = L.map('mapPopup').setView(userLatLng || [-0.8059, 119.6364], 15);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
          attribution: 'Tiles © Esri'
        }).addTo(popupMap);

        popupMap.on('click', async function (e) {
          const latlng = [e.latlng.lat, e.latlng.lng];
          if (popupMarker) popupMap.removeLayer(popupMarker);
          popupMarker = L.marker(latlng).addTo(popupMap);

          const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latlng[0]}&lon=${latlng[1]}&format=json`);
          const data = await res.json();
          document.getElementById(targetInputId).value = data.display_name;

          if (targetInputId === 'origin') {
            userLatLng = latlng;
            if (originMarker) map.removeLayer(originMarker);
            originMarker = L.marker(latlng).addTo(map).bindPopup("Asal").openPopup();
          } else {
            tujuanLatLng = latlng;
            if (tujuanMarker) map.removeLayer(tujuanMarker);
            tujuanMarker = L.marker(latlng).addTo(map).bindPopup("Tujuan").openPopup();
          }

          hitungJarakDanBiaya();
          tampilkanRute(); //paggil rute pengiriman
          bootstrap.Modal.getInstance(document.getElementById('modalPeta')).hide();
        });
      } else {
        popupMap.invalidateSize();
      }
    }, 300);
  }

  // Set koordinat manual
  function setKoordinatManual() {
    const val = document.getElementById("koordinatManual").value;
    if (!val.includes(',')) return alert("Format salah, pisahkan dengan koma");
    const [lat, lon] = val.split(',').map(s => parseFloat(s.trim()));
    if (isNaN(lat) || isNaN(lon)) return alert("Koordinat tidak valid");

    tujuanLatLng = [lat, lon];
    if (tujuanMarker) map.removeLayer(tujuanMarker);
    tujuanMarker = L.marker(tujuanLatLng).addTo(map).bindPopup("Tujuan").openPopup();

    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
      .then(res => res.json())
      .then(data => {
        document.getElementById("destination").value = data.display_name;
        hitungJarakDanBiaya();
        tampilkanRute(); //paggil rute pengiriman
      });
  }

  // Submit Form
  document.getElementById("formOrder").addEventListener("submit", function(e) {
    e.preventDefault();
    const origin = document.getElementById("origin").value;
    const destination = document.getElementById("destination").value;
    const barang = document.getElementById("barang").value;
    const wa = document.getElementById("wa").value;
    const biaya = document.getElementById("ongkir").dataset.biaya || 0;

    fetch('simpan_order.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        origin,
        destination,
        barang,
        wa,
        ongkir: biaya,
        nama: "Pelanggan"
      })
    })
    .then(res => res.json())
    .then(data => {
      if (data.status === "success") {
        const kode = data.kode || "N/A";
        alert("Pesanan berhasil disimpan!\nKode: " + kode);
        location.reload(); // Reload halaman agar form kembali kosong

        const linkAsal = `https://www.google.com/maps?q=${userLatLng[0]},${userLatLng[1]}`;
        const linkTujuan = `https://www.google.com/maps?q=${tujuanLatLng[0]},${tujuanLatLng[1]}`;
        const pesan = `Halo Admin,%0A- Barang: ${barang}%0A- Dari: ${origin}%0A📍 ${linkAsal}%0A- Ke: ${destination}%0A📍 ${linkTujuan}%0A- WA: https://wa.me/${wa.replace(/^0/, '62')}%0AKode: ${kode}%0AOngkir: Rp ${biaya}`;

        window.open(`https://wa.me/6285172114325?text=${pesan}`, '_blank');
      }
    });
  });

  // Load tarif
    fetch('get_tarif.php')
      .then(res => res.json())
      .then(data => {
        tarifPerKm = parseInt(data.tarif || 2000);
        tarifLebihPerKm = parseInt(data.tarif_lebih || tarifPerKm);
        document.getElementById("marqueeInfo").innerText =
          `🚚 Ongkir: Rp ${tarifPerKm}/km pertama (sampai 5km), lalu Rp ${tarifLebihPerKm}/km setelahnya. klik 📍 untuk menandai lokasi`;
      });

  // Tooltip Bootstrap
  const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
  tooltipTriggerList.forEach(el => new bootstrap.Tooltip(el));
  
  
  //scrip pendukung modal pilih manual titik dari googlemap
    let targetKoordinatInput = null;

    function bukaModalKoordinat(inputId) {
      targetKoordinatInput = inputId;
      document.getElementById("inputKoordinat").value = "";
      const modal = new bootstrap.Modal(document.getElementById('modalKoordinat'));
      modal.show();
    }
    
    function setKoordinatDariModal() {
      const val = document.getElementById("inputKoordinat").value;
      if (!val.includes(',')) return alert("Format salah, pisahkan dengan koma");
    
      const [lat, lon] = val.split(',').map(v => parseFloat(v.trim()));
      if (isNaN(lat) || isNaN(lon)) return alert("Koordinat tidak valid");
    
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
        .then(res => res.json())
        .then(data => {
          const alamat = data.display_name;
          document.getElementById(targetKoordinatInput).value = alamat;
    
          if (targetKoordinatInput === 'origin') {
            userLatLng = [lat, lon];
            if (originMarker) map.removeLayer(originMarker);
            originMarker = L.marker(userLatLng).addTo(map).bindPopup("Asal").openPopup();
          } else {
            tujuanLatLng = [lat, lon];
            if (tujuanMarker) map.removeLayer(tujuanMarker);
            tujuanMarker = L.marker(tujuanLatLng).addTo(map).bindPopup("Tujuan").openPopup();
          }
    
          hitungJarakDanBiaya();
          tampilkanRute(); //paggil rute pengiriman
          bootstrap.Modal.getInstance(document.getElementById('modalKoordinat')).hide();
        });
    }

</script>
<footer class="bg-dark text-white text-center py-3 mt-4">
  <div class="container">
    <p class="mb-0">&copy; 2025 Kurir Bansel - Banawa Selatan</p>
    <small>Dibuat oleh Tim Tams Project</small>
  </div>
</footer>
</body>
</html>
